name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build:pages

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf docs assets data images
          cp -r dist/assets assets
          cp -r dist/data data
          cp -r dist/images images
          cp dist/index.source.html index.html
          mkdir -p docs
          cp dist/index.source.html docs/index.html
          cp -r dist/assets docs/assets
          cp -r dist/data docs/data
          cp -r dist/images docs/images
          touch docs/.nojekyll

          git add -A docs assets data images index.html
          if git diff --staged --quiet; then
            echo "No deploy changes to commit."
            exit 0
          fi

          git commit -m "Deploy GitHub Pages build [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
