name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build:pages

      - run: |
          rm -rf docs assets data
          cp -r dist/assets assets
          cp -r dist/data data
          cp dist/index.source.html index.html
          mkdir -p docs
          cp dist/index.source.html docs/index.html
          cp -r dist/assets docs/assets
          cp -r dist/data docs/data
          touch docs/.nojekyll

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Deploy GitHub Pages build [skip ci]"
          file_pattern: |
            docs/**
            assets/**
            data/**
            index.html
