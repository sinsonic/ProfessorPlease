name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build:pages

      - run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Deploy GitHub Pages build to docs/"
          file_pattern: docs/**
